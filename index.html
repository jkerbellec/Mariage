<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 26 Septembre 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf8f5;
            color: #1a1a1a;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Particules */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
            box-shadow: 0 0 8px #c9a84c, 0 0 18px #c9a84c;
        }

        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; transform: translateY(90vh) scale(1); }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        .header .et {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #c9a84c, #a07830, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header .et i {
            font-size: 2rem;
            -webkit-text-fill-color: #c9a84c;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: normal;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #999;
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: #999;
        }

        .header .date {
            color: #999;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .date i {
            color: #c9a84c;
            font-size: 1rem;
            -webkit-text-fill-color: #c9a84c;
        }

        /* Bouton musique */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 50px;
            padding: 10px 18px;
            color: #c9a84c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            transition: background 0.3s;
            backdrop-filter: blur(6px);
        }

        .music-btn:hover { background: rgba(201, 168, 76, 0.25); }

        .music-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }

        .music-bars span {
            display: block;
            width: 3px;
            background: #c9a84c;
            border-radius: 2px;
            animation: bar 0.6s ease-in-out infinite alternate;
        }

        .music-bars span:nth-child(1) { height: 8px;  animation-delay: 0s; }
        .music-bars span:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .music-bars span:nth-child(3) { height: 10px; animation-delay: 0.4s; }
        .music-bars span:nth-child(4) { height: 20px; animation-delay: 0.1s; }
        .music-bars span:nth-child(5) { height: 6px;  animation-delay: 0.3s; }

        @keyframes bar {
            from { transform: scaleY(0.4); opacity: 0.6; }
            to   { transform: scaleY(1);   opacity: 1; }
        }

        .music-bars.paused span { animation-play-state: paused; }

        /* Compte à rebours */
        .countdown {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            z-index: 1;
        }

        .countdown-item {
            text-align: center;
            background: rgba(201, 168, 76, 0.08);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 12px;
            padding: 20px 25px;
            min-width: 80px;
        }

        .countdown-item span {
            display: block;
            font-size: 2.5rem;
            color: #c9a84c;
            font-weight: bold;
        }

        .countdown-item p {
            font-size: 0.7rem;
            color: #aaa;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* RSVP */
        .rsvp-section {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            z-index: 1;
            box-shadow: 0 4px 30px rgba(201, 168, 76, 0.08);
        }

        .section-title {
            text-align: center;
            font-size: 1rem;
            font-weight: normal;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 10px;
        }

        .section-subtitle {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .rsvp-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
            margin-bottom: 25px;
        }

        .rsvp-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .rsvp-btn {
            padding: 14px 28px;
            border-radius: 6px;
            border: 1px solid rgba(201, 168, 76, 0.5);
            background: transparent;
            color: #c9a84c;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .rsvp-btn:hover {
            background: rgba(201, 168, 76, 0.1);
        }

        .rsvp-btn-non {
            border-color: #ddd;
            color: #aaa;
        }

        .rsvp-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: #f8f5f0;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 6px;
            color: #1a1a1a;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            outline: none;
            transition: border 0.3s;
            margin-top: 15px;
        }

        .rsvp-input:focus {
            border-color: rgba(201, 168, 76, 0.6);
        }

        .rsvp-input::placeholder { color: #bbb; }

        .rsvp-submit {
            width: 100%;
            padding: 16px;
            border-radius: 6px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border: none;
            color: #fff;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        .rsvp-submit:hover { opacity: 0.85; }

        .rsvp-submit-non {
            width: 100%;
            padding: 16px;
            background: #eee;
            border: none;
            color: #555;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        .rsvp-confirm {
            display: none;
            text-align: center;
            color: #c9a84c;
            font-size: 0.9rem;
            letter-spacing: 2px;
            line-height: 1.8;
            padding: 20px;
        }

        /* Todo */
        .todo-section {
            width: 100%;
            max-width: 600px;
            z-index: 1;
            margin-bottom: 40px;
        }

        .todo-section h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: normal;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 20px;
        }

        .progress-container {
            background: rgba(201, 168, 76, 0.1);
            border-radius: 50px;
            height: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #f5e6c8);
            border-radius: 50px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.75rem;
            color: #bbb;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-task input {
            flex: 1;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            color: #1a1a1a;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border 0.3s;
        }

        .add-task input:focus { border-color: rgba(201, 168, 76, 0.5); }
        .add-task input::placeholder { color: #bbb; }

        .add-task select {
            padding: 12px;
            background: #ffffff;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            color: #1a1a1a;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .add-task button {
            padding: 12px 16px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: opacity 0.3s;
        }

        .add-task button:hover { opacity: 0.85; }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            background: transparent;
            color: #aaa;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-btn.active, .filter-btn:hover {
            background: rgba(201, 168, 76, 0.12);
            border-color: rgba(201, 168, 76, 0.5);
            color: #c9a84c;
        }

        .todo-list { display: flex; flex-direction: column; gap: 10px; }

        .todo-item {
            background: #ffffff;
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .todo-item:hover { border-color: rgba(201, 168, 76, 0.35); }

        .todo-item.done .task-text {
            text-decoration: line-through;
            color: #bbb;
        }

        /* Checkbox */
        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(201, 168, 76, 0.4);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .custom-checkbox.checked {
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border-color: #c9a84c;
        }

        .custom-checkbox.checked i { color: #fff; font-size: 0.85rem; }

        .task-info  { flex: 1; }
        .task-text  { font-size: 0.9rem; color: #1a1a1a; margin-bottom: 5px; letter-spacing: 0.3px; }

        .task-category {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.5px;
        }

        .task-category i { font-size: 0.8rem; }

        .cat-lieu    { background: rgba(100,149,237,0.12); color: #4a7fd4; }
        .cat-tenue   { background: rgba(255,182,193,0.15); color: #e8758a; }
        .cat-repas   { background: rgba(100,200,100,0.12); color: #4a9e4a; }
        .cat-deco    { background: rgba(201,168,76,0.15);  color: #a07830; }
        .cat-invites { background: rgba(180,100,220,0.12); color: #9050b0; }
        .cat-autre   { background: rgba(0,0,0,0.06);       color: #888; }

        .delete-btn {
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .delete-btn:hover { color: #e74c3c; }

        .empty-msg {
            text-align: center;
            color: #bbb;
            font-size: 0.85rem;
            padding: 40px;
            letter-spacing: 3px;
        }

        /* Photo bas de page */
        .photo-section {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            gap: 16px;
            width: 100%;
            max-width: 500px;
        }

        .gold-line {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
        }

        .photo-label {
            color: #c9a84c;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .photo-frame {
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.12);
            width: 100%;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-frame img:hover { transform: scale(1.02); }

        /* Responsive */
        @media (max-width: 600px) {
            .header .et     { font-size: 2.2rem; }
            .header h1      { font-size: 0.85rem; }
            .countdown      { gap: 12px; }
            .countdown-item { padding: 15px; min-width: 65px; }
            .countdown-item span { font-size: 1.8rem; }
            .add-task       { flex-wrap: wrap; }
            .add-task select{ width: 100%; }
            .photo-section  { max-width: 100%; }
            .rsvp-buttons   { flex-direction: column; align-items: center; }
            .rsvp-btn       { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Particules -->
    <div class="particles" id="particles"></div>

    <!-- Bouton musique -->
    <button class="music-btn" onclick="toggleMusic()">
        <i class="ph ph-play" id="musicIcon"></i>
        <div class="music-bars paused" id="musicBars">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </button>

    <audio id="bgMusic" loop>
        <source src="musique.mp3" type="audio/mpeg">
    </audio>

    <!-- Header -->
    <div class="header">
        <div class="et">
            Mélina <i class="ph ph-heart"></i> Jordan
        </div>
        <h1>Nous vous convions à notre mariage</h1>
        <p class="date">
            <i class="ph ph-calendar"></i>
            26 Septembre 2026
        </p>
    </div>

    <!-- Compte à rebours -->
    <div class="countdown">
        <div class="countdown-item">
            <span id="days">00</span>
            <p>Jours</p>
        </div>
        <div class="countdown-item">
            <span id="hours">00</span>
            <p>Heures</p>
        </div>
        <div class="countdown-item">
            <span id="minutes">00</span>
            <p>Minutes</p>
        </div>
        <div class="countdown-item">
            <span id="seconds">00</span>
            <p>Secondes</p>
        </div>
    </div>

    <!-- RSVP -->
    <div class="rsvp-section">
        <h2 class="section-title">✦ &nbsp; RSVP &nbsp; ✦</h2>
        <p class="section-subtitle">Serez-vous des nôtres ?</p>
        <div class="rsvp-divider"></div>

        <div class="rsvp-buttons" id="rsvpButtons">
            <button class="rsvp-btn" onclick="choixRSVP('oui')">
                ✦ &nbsp; Oui, j'y serai !
            </button>
            <button class="rsvp-btn rsvp-btn-non" onclick="choixRSVP('non')">
                ✗ &nbsp; Non, je ne pourrai pas
            </button>
        </div>

        <div id="formOui" style="display:none;">
            <input type="text"   id="rsvpPrenom"        class="rsvp-input" placeholder="Prénom" />
            <input type="text"   id="rsvpNom"           class="rsvp-input" placeholder="Nom" />
            <input type="number" id="rsvpAccompagnants" class="rsvp-input" placeholder="Nombre d'accompagnants (0 si seul)" min="0" />
            <button class="rsvp-submit" onclick="envoyerRSVP()">
                Confirmer ma présence &nbsp; ✦
            </button>
        </div>

        <div id="formNon" style="display:none;">
            <input type="text" id="rsvpPrenomNon" class="rsvp-input" placeholder="Prénom" />
            <input type="text" id="rsvpNomNon"    class="rsvp-input" placeholder="Nom" />
            <button class="rsvp-submit-non" onclick="envoyerRSVPNon()">
                Confirmer mon absence &nbsp; ✗
            </button>
        </div>

        <div class="rsvp-confirm" id="rsvpConfirm"></div>
    </div>

    <!-- Todo -->
    <div class="todo-section">
        <h2>
            <i class="ph ph-check-square"></i>
            Liste des tâches
        </h2>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 0 tâches complétées</div>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Nouvelle tâche..." />
            <select id="categorySelect">
                <option value="lieu">📍 Lieu</option>
                <option value="tenue">👗 Tenues</option>
                <option value="repas">🍽️ Traiteur</option>
                <option value="deco">✨ Déco</option>
                <option value="invites">💌 Invités</option>
                <option value="autre">📌 Autre</option>
            </select>
            <button onclick="addTask()">
                <i class="ph ph-plus"></i>
            </button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all', this)">
                <i class="ph ph-squares-four"></i> Tout
            </button>
            <button class="filter-btn" onclick="filterTasks('lieu', this)">
                <i class="ph ph-map-pin"></i> Lieu
            </button>
            <button class="filter-btn" onclick="filterTasks('tenue', this)">
                <i class="ph ph-dress"></i> Tenues
            </button>
            <button class="filter-btn" onclick="filterTasks('repas', this)">
                <i class="ph ph-fork-knife"></i> Traiteur
            </button>
            <button class="filter-btn" onclick="filterTasks('deco', this)">
                <i class="ph ph-sparkle"></i> Déco
            </button>
            <button class="filter-btn" onclick="filterTasks('invites', this)">
                <i class="ph ph-envelope"></i> Invités
            </button>
            <button class="filter-btn" onclick="filterTasks('autre', this)">
                <i class="ph ph-push-pin"></i> Autre
            </button>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <!-- Photo bas de page -->
    <div class="photo-section">
        <div class="gold-line"></div>
        <p class="photo-label">
            <i class="ph ph-heart"></i>
            Mélina &amp; Jordan
            <i class="ph ph-heart"></i>
        </p>
        <div class="photo-frame">
            <img src="photo.jpeg" alt="Mélina & Jordan" />
        </div>
        <div class="gold-line"></div>
    </div>

    <script>
        // ── MUSIQUE ────────────────────────────────────────────────────────
        const audio     = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        const musicBars = document.getElementById('musicBars');
        let   isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicIcon.className = 'ph ph-play';
                musicBars.classList.add('paused');
            } else {
                audio.play();
                musicIcon.className = 'ph ph-pause';
                musicBars.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        // ── RSVP ───────────────────────────────────────────────────────────
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwMhwIHP-bUlqEyBdwknsXtXjvPWNi5yTnkM4IzQfCVEVKs-oeOgrQKFzGnRaxEU4FK/exec';

        function choixRSVP(choix) {
            document.getElementById('formOui').style.display = choix === 'oui' ? 'block' : 'none';
            document.getElementById('formNon').style.display = choix === 'non' ? 'block' : 'none';
        }

        function envoyerRSVP() {
            const prenom        = document.getElementById('rsvpPrenom').value.trim();
            const nom           = document.getElementById('rsvpNom').value.trim();
            const accompagnants = document.getElementById('rsvpAccompagnants').value || 0;

            if (!prenom || !nom) {
                alert('Merci de renseigner votre prénom et votre nom !');
                return;
            }

            fetch(SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ prenom, nom, presence: 'OUI', accompagnants })
            })
            .then(() => {
                document.getElementById('rsvpButtons').style.display = 'none';
                document.getElementById('formOui').style.display     = 'none';
                const confirm = document.getElementById('rsvpConfirm');
                confirm.style.display = 'block';
                confirm.innerHTML = `✦ Merci ${prenom} !<br>Votre présence a bien été enregistrée.<br>Nous avons hâte de vous retrouver ! ✦`;
            })
            .catch(() => alert('Une erreur est survenue, veuillez réessayer.'));
        }

        function envoyerRSVPNon() {
            const prenom = document.getElementById('rsvpPrenomNon').value.trim();
            const nom    = document.getElementById('rsvpNomNon').value.trim();

            if (!prenom || !nom) {
                alert('Merci de renseigner votre prénom et votre nom !');
                return;
            }

            fetch(SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ prenom, nom, presence: 'NON', accompagnants: 0 })
            })
            .then(() => {
                document.getElementById('rsvpButtons').style.display = 'none';
                document.getElementById('formNon').style.display     = 'none';
                const confirm = document.getElementById('rsvpConfirm');
                confirm.style.display = 'block';
                confirm.innerHTML = `✦ Merci ${prenom}.<br>Nous sommes tristes de ne pas pouvoir vous compter parmi nous.<br>Vous nous manquerez ! ✦`;
            })
            .catch(() => alert('Une erreur est survenue, veuillez réessayer.'));
        }

        // ── DONNÉES TÂCHES ─────────────────────────────────────────────────
        const categories = {
            lieu:    { label: 'Lieu',     icon: 'ph-map-pin',    css: 'cat-lieu'    },
            tenue:   { label: 'Tenues',   icon: 'ph-dress',      css: 'cat-tenue'   },
            repas:   { label: 'Traiteur', icon: 'ph-fork-knife', css: 'cat-repas'   },
            deco:    { label: 'Déco',     icon: 'ph-sparkle',    css: 'cat-deco'    },
            invites: { label: 'Invités',  icon: 'ph-envelope',   css: 'cat-invites' },
            autre:   { label: 'Autre',    icon: 'ph-push-pin',   css: 'cat-autre'   },
        };

        let tasks         = JSON.parse(localStorage.getItem('weddingTasks') || '[]');
        let currentFilter = 'all';

        function saveTasks() {
            localStorage.setItem('weddingTasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const cat   = document.getElementById('categorySelect').value;
            const text  = input.value.trim();
            if (!text) return;
            tasks.push({ id: Date.now(), text, cat, done: false });
            saveTasks();
            input.value = '';
            renderTasks();
        }

        document.getElementById('taskInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function filterTasks(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            const list  = document.getElementById('todoList');
            const total = tasks.length;
            const done  = tasks.filter(t => t.done).length;
            const pct   = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = done + ' / ' + total + ' tâches complétées';

            const filtered = currentFilter === 'all'
                ? tasks
                : tasks.filter(t => t.cat === currentFilter);

            if (!filtered.length) {
                list.innerHTML = '<div class="empty-msg">— Aucune tâche —</div>';
                return;
            }

            list.innerHTML = filtered.map(t => {
                const cat = categories[t.cat] || categories['autre'];
                return `
                <div class="todo-item ${t.done ? 'done' : ''}">
                    <div class="custom-checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">
                        ${t.done ? '<i class="ph ph-check"></i>' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-text">${t.text}</div>
                        <span class="task-category ${cat.css}">
                            <i class="ph ${cat.icon}"></i>
                            ${cat.label}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${t.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>`;
            }).join('');
        }

        // ── COMPTE À REBOURS ───────────────────────────────────────────────
        function updateCountdown() {
            const target = new Date('2026-09-26T00:00:00');
            const now    = new Date();
            const diff   = target - now;

            if (diff <= 0) {
                document.querySelector('.countdown').innerHTML =
                    '<p style="color:#c9a84c;font-size:1.5rem;letter-spacing:3px">✦ C\'est le grand jour ! ✦</p>';
                return;
            }

            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);

            document.getElementById('days').textContent    = String(days).padStart(2, '0');
            document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── PARTICULES ─────────────────────────────────────────────────────
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#c9a84c', '#e8c96d', '#b8860b', '#d4af37', '#f0d060'];

            for (let i = 0; i < 55; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left              = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay    = (Math.random() * 10) + 's';

                const size = (Math.random() * 5 + 3) + 'px';
                p.style.width  = size;
                p.style.height = size;

                const color = colors[Math.floor(Math.random() * colors.length)];
                p.style.background = color;
                p.style.boxShadow  = `0 0 8px ${color}, 0 0 18px ${color}`;

                container.appendChild(p);
            }
        }

        createParticles();
        renderTasks();
    </script>
</body>
</html>
