<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 26 Septembre 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #faf8f5;
            color: #1a1a1a;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
            overflow-x: hidden;
        }

        /* ── PARTICULES ── */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute;
            width: 5px; height: 5px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
            box-shadow: 0 0 8px #c9a84c, 0 0 18px #c9a84c;
        }
        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; transform: translateY(90vh) scale(1); }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
        }

        /* ── HEADER ── */
        .header { text-align: center; margin-bottom: 40px; z-index: 1; padding: 0 10px; }
        .header .et {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: normal;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #c9a84c, #a07830, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header .et i { font-size: clamp(1.4rem, 5vw, 2rem); -webkit-text-fill-color: #c9a84c; }
        .header h1 {
            font-size: clamp(0.7rem, 3vw, 1rem);
            font-weight: normal;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #999;
            -webkit-text-fill-color: #999;
        }
        .header .date {
            color: #999;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header .date i { color: #c9a84c; -webkit-text-fill-color: #c9a84c; }

        /* ── BOUTON MUSIQUE ── */
        .music-btn {
            position: fixed;
            top: 14px; right: 14px;
            z-index: 100;
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 50px;
            padding: 8px 14px;
            color: #c9a84c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: background 0.3s;
            backdrop-filter: blur(6px);
        }
        .music-btn:hover { background: rgba(201, 168, 76, 0.25); }
        .music-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; }
        .music-bars span {
            display: block; width: 3px;
            background: #c9a84c; border-radius: 2px;
            animation: bar 0.6s ease-in-out infinite alternate;
        }
        .music-bars span:nth-child(1) { height: 8px;  animation-delay: 0s; }
        .music-bars span:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .music-bars span:nth-child(3) { height: 10px; animation-delay: 0.4s; }
        .music-bars span:nth-child(4) { height: 18px; animation-delay: 0.1s; }
        .music-bars span:nth-child(5) { height: 6px;  animation-delay: 0.3s; }
        @keyframes bar {
            from { transform: scaleY(0.4); opacity: 0.6; }
            to   { transform: scaleY(1);   opacity: 1; }
        }
        .music-bars.paused span { animation-play-state: paused; }

        /* ── COMPTE À REBOURS ── */
        .countdown {
            display: flex;
            gap: clamp(8px, 3vw, 30px);
            margin-bottom: 50px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
        }
        .countdown-item {
            text-align: center;
            background: rgba(201, 168, 76, 0.08);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 12px;
            padding: clamp(12px, 3vw, 20px) clamp(14px, 4vw, 25px);
            min-width: clamp(60px, 18vw, 80px);
        }
        .countdown-item span {
            display: block;
            font-size: clamp(1.6rem, 6vw, 2.5rem);
            color: #c9a84c;
            font-weight: bold;
        }
        .countdown-item p {
            font-size: clamp(0.55rem, 2vw, 0.7rem);
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── CARD GÉNÉRIQUE ── */
        .card {
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: #fff;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 16px;
            padding: clamp(24px, 6vw, 40px);
            box-shadow: 0 4px 30px rgba(201, 168, 76, 0.08);
            margin-bottom: 40px;
        }

        .section-title {
            text-align: center;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            font-weight: normal;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 8px;
        }
        .section-subtitle {
            text-align: center;
            color: #aaa;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
            margin-bottom: 28px;
        }

        /* ── RSVP ── */
        .rsvp-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .rsvp-btn {
            padding: 13px 22px;
            border-radius: 6px;
            border: 1px solid rgba(201, 168, 76, 0.5);
            background: transparent;
            color: #c9a84c;
            font-family: inherit;
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 140px;
        }
        .rsvp-btn:hover { background: rgba(201, 168, 76, 0.1); }
        .rsvp-btn-non { border-color: #ddd; color: #aaa; }
        .rsvp-input {
            width: 100%;
            padding: 13px;
            margin-bottom: 10px;
            background: #f8f5f0;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 6px;
            color: #1a1a1a;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 1px;
            outline: none;
            transition: border 0.3s;
            margin-top: 12px;
        }
        .rsvp-input:focus { border-color: rgba(201, 168, 76, 0.6); }
        .rsvp-input::placeholder { color: #bbb; }
        .rsvp-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c9a84c, #a07830);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }
        .rsvp-submit:hover { opacity: 0.85; }
        .rsvp-submit-non {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 6px;
            color: #aaa;
            font-family: inherit;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .rsvp-submit-non:hover { border-color: #bbb; color: #888; }
        .rsvp-confirm {
            display: none;
            text-align: center;
            color: #c9a84c;
            font-size: 0.85rem;
            letter-spacing: 2px;
            line-height: 2;
            margin-top: 20px;
        }

        /* ── PROGRAMME ── */
        .timeline { display: flex; flex-direction: column; gap: 0; }
        .timeline-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            position: relative;
        }
        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 19px;
            top: 42px;
            width: 1px;
            height: calc(100% + 4px);
            background: linear-gradient(to bottom, rgba(201,168,76,0.4), rgba(201,168,76,0.1));
        }
        .tl-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c9a84c;
            font-size: 1.1rem;
            z-index: 1;
        }
        .tl-content { padding-bottom: 28px; flex: 1; }
        .tl-time {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #c9a84c;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .tl-title {
            font-size: clamp(0.85rem, 3vw, 0.95rem);
            color: #1a1a1a;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .tl-desc {
            font-size: 0.78rem;
            color: #aaa;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        /* ── LIEUX ── */
        .lieux-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 480px) {
            .lieux-grid { grid-template-columns: 1fr; }
        }
        .lieu-card {
            background: #faf8f5;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: border-color 0.3s;
        }
        .lieu-card:hover { border-color: rgba(201, 168, 76, 0.5); }
        .lieu-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: #c9a84c;
            font-size: 1.3rem;
        }
        .lieu-type {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #c9a84c;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .lieu-name {
            font-size: 0.9rem;
            color: #1a1a1a;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .lieu-adresse {
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 0.5px;
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .lieu-map-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(201, 168, 76, 0.4);
            background: transparent;
            color: #c9a84c;
            font-family: inherit;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lieu-map-btn:hover { background: rgba(201, 168, 76, 0.1); }

        /* ── BARRE DE PROGRESSION ── */
        .progress-section {
            z-index: 1;
            width: 100%;
            max-width: 520px;
            margin-bottom: 50px;
            text-align: center;
            padding: 0 4px;
        }
        .progress-title {
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .progress-subtitle {
            font-size: 0.78rem;
            color: #bbb;
            letter-spacing: 2px;
            margin-bottom: 18px;
        }
        .progress-track {
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 50px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #f5e6c8, #c9a84c);
            background-size: 200% 100%;
            border-radius: 50px;
            animation: shimmer 2.5s linear infinite;
            transition: width 1.5s ease;
        }
        @keyframes shimmer {
            0
